<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор доставки сыпучих грузов - Киров</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .autocomplete-items {
            position: absolute;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            background-color: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border-radius: 0 0 0.5rem 0.5rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
        }
        .autocomplete-item:hover {
            background-color: #e9ecef;
        }
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @-webkit-keyframes spinner {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Header -->
            <div class="bg-indigo-600 p-6 text-white text-center">
                <h1 class="text-2xl font-bold">Расчет доставки грузов</h1>
                <p class="text-indigo-100 mt-1">г. Киров и область</p>
            </div>

            <!-- Form -->
            <div class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Cargo Type -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Тип груза</label>
                        <select id="cargoType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
                            <option value="1.6">Песок</option>
                            <option value="1.6">Щебень</option>
                            <option value="1.6">Гравий</option>
                            <option value="1.7">Грунт</option>
                        </select>
                    </div>

                    <!-- Volume -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Объем груза (м³)</label>
                        <input type="number" id="volume" min="1" placeholder="Введите объем" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
                    </div>
                </div>

                <!-- Calculated Weight -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Расчетный вес (тонн)</label>
                    <input type="text" id="weight" readonly class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-600 font-medium" value="0">
                </div>

                <!-- Destination Address with Autocomplete -->
                <div class="relative">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Место разгрузки (Киров)</label>
                    <div class="relative">
                        <input type="text" id="destination" placeholder="Улица, дом..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none pl-10">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-map-marker-alt text-gray-400"></i>
                        </div>
                        <div id="autocompleteList" class="autocomplete-items hidden"></div>
                    </div>
                </div>

                <!-- Checkbox for New Bridge -->
                <div class="flex items-center space-x-3 p-4 bg-indigo-50 rounded-lg">
                    <input type="checkbox" id="viaNewBridge" class="w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <label for="viaNewBridge" class="text-sm font-medium text-indigo-900 cursor-pointer select-none">
                        Проложить маршрут через "Новый мост"
                    </label>
                </div>

                <!-- Results Section -->
                <div class="border-t pt-6">
                    <div class="flex flex-col space-y-4">
                        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                            <span class="text-gray-600">Расстояние:</span>
                            <span id="distanceResult" class="font-bold text-gray-900">— км</span>
                        </div>
                        <div class="flex justify-between items-center p-5 bg-indigo-600 rounded-xl text-white">
                            <span class="text-lg opacity-90">Итоговая стоимость:</span>
                            <div class="text-right">
                                <span id="totalCost" class="text-2xl font-bold">— руб.</span>
                                <p id="warningMsg" class="text-xs text-orange-200 mt-1 hidden"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="px-8 pb-8 text-center">
                <p class="text-xs text-gray-400">Базовый тариф включает до 5.5 км пути от центра города.</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '815dcb17-ae9f-4045-8cd7-ffc715e44b23';
        const START_COORD = [49.639762, 58.600618]; // [lon, lat] for GraphHopper
        const NEW_BRIDGE_COORD = [49.598264, 58.650113];
        const BASE_KM = 5.5;

        // Elements
        const cargoTypeEl = document.getElementById('cargoType');
        const volumeEl = document.getElementById('volume');
        const weightEl = document.getElementById('weight');
        const destinationEl = document.getElementById('destination');
        const viaNewBridgeEl = document.getElementById('viaNewBridge');
        const distanceResultEl = document.getElementById('distanceResult');
        const totalCostEl = document.getElementById('totalCost');
        const autocompleteListEl = document.getElementById('autocompleteList');
        const warningMsgEl = document.getElementById('warningMsg');

        let targetCoord = null;
        let debounceTimer;

        // 1. Calculate weight automatically
        function updateWeight() {
            const density = parseFloat(cargoTypeEl.value);
            const volume = parseFloat(volumeEl.value) || 0;
            const weight = (volume * density).toFixed(2);
            weightEl.value = weight;
            calculateFinal();
        }

        cargoTypeEl.addEventListener('change', updateWeight);
        volumeEl.addEventListener('input', updateWeight);

        // 2. Geocoding Autocomplete
        destinationEl.addEventListener('input', function() {
            const query = this.value;
            clearTimeout(debounceTimer);
            if (!query || query.length < 3) {
                autocompleteListEl.classList.add('hidden');
                return;
            }

            debounceTimer = setTimeout(() => {
                fetchGeocoding(query);
            }, 500);
        });

        async function fetchGeocoding(query) {
            try {
                // Focus search around Kirov, Russia
                const url = `https://graphhopper.com/api/1/geocode?q=${encodeURIComponent('Киров ' + query)}&locale=ru&limit=5&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.hits && data.hits.length > 0) {
                    showSuggestions(data.hits);
                }
            } catch (error) {
                console.error("Geocoding error:", error);
            }
        }

        function showSuggestions(hits) {
            autocompleteListEl.innerHTML = '';
            autocompleteListEl.classList.remove('hidden');
            
            hits.forEach(hit => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item border-b border-gray-100 last:border-0';
                const name = hit.name + (hit.street ? ', ' + hit.street : '') + (hit.housenumber ? ', ' + hit.housenumber : '');
                div.textContent = name;
                div.addEventListener('click', () => {
                    destinationEl.value = name;
                    targetCoord = [hit.point.lng, hit.point.lat];
                    autocompleteListEl.classList.add('hidden');
                    calculateRoute();
                });
                autocompleteListEl.appendChild(div);
            });
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target !== destinationEl) {
                autocompleteListEl.classList.add('hidden');
            }
        });

        // 3. Routing
        async function calculateRoute() {
            if (!targetCoord) return;

            try {
                let points = [START_COORD];
                if (viaNewBridgeEl.checked) {
                    points.push(NEW_BRIDGE_COORD);
                }
                points.push(targetCoord);

                // Build points query string
                const pointsQuery = points.map(p => `point=${p[1]},${p[0]}`).join('&');
                const url = `https://graphhopper.com/api/1/route?${pointsQuery}&profile=car&locale=ru&calc_points=false&key=${API_KEY}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.paths && data.paths.length > 0) {
                    const distanceMeters = data.paths[0].distance;
                    const distanceKm = distanceMeters / 1000;
                    distanceResultEl.textContent = distanceKm.toFixed(2) + ' км';
                    calculateFinal(distanceKm);
                }
            } catch (error) {
                console.error("Routing error:", error);
            }
        }

        viaNewBridgeEl.addEventListener('change', calculateRoute);

        // 4. Cost Calculation
        function calculateFinal(distance = null) {
            const weight = parseFloat(weightEl.value) || 0;
            
            // If distance is not provided (e.g. only volume changed), try to get from result text
            if (distance === null) {
                const distText = distanceResultEl.textContent;
                if (distText === '— км') return;
                distance = parseFloat(distText);
            }

            if (weight === 0 || !distance) return;

            const extraL = Math.max(0, distance - BASE_KM);
            let price = 0;
            warningMsgEl.classList.add('hidden');

            if (weight < 3) {
                // Minimum tariff (Category 1)
                price = 5500 + (extraL * 670);
            } else if (weight >= 3 && weight < 16) {
                price = 5500 + (extraL * 670);
            } else if (weight >= 16 && weight <= 50) {
                price = 7500 + (extraL * 900);
            } else {
                // > 50 tons
                totalCostEl.textContent = "— руб.";
                warningMsgEl.textContent = "Требуется индивидуальный расчет (вес > 50т)";
                warningMsgEl.classList.remove('hidden');
                return;
            }

            totalCostEl.textContent = Math.round(price).toLocaleString('ru-RU') + ' руб.';
        }
    </script>
</body>
</html>
